steps:
  - label: ":shell: Shellcheck"
    plugins:
      - shellcheck#v1.4.0:
          files:
            - hooks/**
            - lib/**

  - label: ":sparkles: Plugin lint"
    plugins:
      - plugin-linter#v3.3.0:
          id: testingbot/testingbot

  - label: ":bash: Tests"
    plugins:
      - docker-compose#v5.4.1:
          run: tests

  - wait

  - label: ":chrome: E2E (real tunnel + browser session)"
    command: .buildkite/e2e-test.sh
    env:
      TB_E2E_SE_PORT: "8446"
    plugins:
      - testingbot/testingbot#${BUILDKITE_COMMIT}:
          tunnel-args:
            - "--se-port"
            - "8446"
